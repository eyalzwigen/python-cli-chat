name: Build Server

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Server-PythonChat-Windows
            executable: dist/server.exe

          - os: macos-latest
            artifact_name: Server-PythonChat-macOS
            executable: dist/server

          - os: ubuntu-latest
            artifact_name: Server-PythonChat-Linux
            executable: dist/server

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Verify imports
        env:
          PYTHONPATH: src
        run: |
          python -c "import shared.entities; import server.server; print('Server imports OK')"

      - name: Build server
        run: >
          python -m PyInstaller
          --clean
          --onefile
          --name server
          --paths src
          --collect-submodules shared
          src/server/server.py

      - name: Upload server executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.executable }}
          if-no-files-found: error