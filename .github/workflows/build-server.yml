name: Build Server

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Server-PythonChat-Windows
            executable: dist/server.exe
            release_asset: dist/Server-PythonChat-Windows.exe

          - os: macos-latest
            artifact_name: Server-PythonChat-macOS
            executable: dist/server
            release_asset: dist/Server-PythonChat-macOS

          - os: ubuntu-latest
            artifact_name: Server-PythonChat-Linux
            executable: dist/server
            release_asset: dist/Server-PythonChat-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Verify imports
        env:
          PYTHONPATH: src
        run: |
          python -c "import shared.entities; import server.server; print('Server imports OK')"

      - name: Build server
        run: >
          python -m PyInstaller
          --clean
          --onefile
          --name server
          --paths src
          --collect-submodules shared
          src/server/server.py

      - name: Rename executable for release
        shell: bash
        run: |
          mv "${{ matrix.executable }}" "${{ matrix.release_asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.release_asset }}
          if-no-files-found: error

  update-release:
    name: Update GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Delete old ZIP assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete-asset server_program Server-PythonChat-Windows.zip --yes --repo ${{ github.repository }} || true
          gh release delete-asset server_program Server-PythonChat-macOS.zip --yes --repo ${{ github.repository }} || true
          gh release delete-asset server_program Server-PythonChat-Linux.zip --yes --repo ${{ github.repository }} || true

      - name: Replace release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload server_program \
            release-assets/Server-PythonChat-Windows.exe \
            release-assets/Server-PythonChat-macOS \
            release-assets/Server-PythonChat-Linux \
            --clobber \
            --repo ${{ github.repository }}