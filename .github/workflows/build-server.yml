name: Build Server

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Server-PythonChat-Windows
            executable: dist/server.exe

          - os: macos-latest
            artifact_name: Server-PythonChat-macOS
            executable: dist/server

          - os: ubuntu-latest
            artifact_name: Server-PythonChat-Linux
            executable: dist/server

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable
        run: |
          python -m PyInstaller --clean --onefile --name server src/server/server.py

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.executable }}
          if-no-files-found: error
