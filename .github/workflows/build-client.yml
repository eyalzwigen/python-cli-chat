name: Build Client

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: PythonChat-Windows
            executable: dist/PythonChat.exe

          - os: macos-latest
            artifact_name: PythonChat-macOS
            executable: dist/PythonChat

          - os: ubuntu-latest
            artifact_name: PythonChat-Linux
            executable: dist/PythonChat

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Verify imports
        env:
          PYTHONPATH: src
        run: |
          python -c "import shared.entities; import client.ui; import pyfiglet; print('Client imports OK')"

      - name: Build client
        run: >
          python -m PyInstaller
          --clean
          --onefile
          --name PythonChat
          --paths src
          --collect-submodules shared
          --collect-submodules client.ui
          --collect-all pyfiglet
          --add-data "src/client/ui/styles/styles.css:ui/styles"
          src/client/client.py

      - name: Upload client executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.executable }}
          if-no-files-found: error