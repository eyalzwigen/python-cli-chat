name: Build Client

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: PythonChat-Windows
            executable: dist/PythonChat.exe
            release_asset: dist/PythonChat-Windows.exe

          - os: macos-latest
            artifact_name: PythonChat-macOS
            executable: dist/PythonChat
            release_asset: dist/PythonChat-macOS

          - os: ubuntu-latest
            artifact_name: PythonChat-Linux
            executable: dist/PythonChat
            release_asset: dist/PythonChat-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Verify imports
        env:
          PYTHONPATH: src
        run: |
          python -c "import shared.entities; import client.ui; import pyfiglet; print('Client imports OK')"

      - name: Build client
        run: >
          python -m PyInstaller
          --clean
          --onefile
          --name PythonChat
          --paths src
          --collect-submodules shared
          --collect-submodules client.ui
          --collect-all pyfiglet
          --add-data "src/client/ui/styles/styles.css:ui/styles"
          src/client/client.py

      - name: Rename executable for release
        shell: bash
        run: |
          mv "${{ matrix.executable }}" "${{ matrix.release_asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.release_asset }}
          if-no-files-found: error

  update-release:
    name: Update GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Delete old ZIP assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete-asset client_app PythonChat-Windows.zip --yes --repo ${{ github.repository }} || true
          gh release delete-asset client_app PythonChat-macOS.zip --yes --repo ${{ github.repository }} || true
          gh release delete-asset client_app PythonChat-Linux.zip --yes --repo ${{ github.repository }} || true

      - name: Replace release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload client_app \
            release-assets/PythonChat-Windows.exe \
            release-assets/PythonChat-macOS \
            release-assets/PythonChat-Linux \
            --clobber \
            --repo ${{ github.repository }}
